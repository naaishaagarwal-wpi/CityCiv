<!DOCTYPE html>
<!-- Account page for managing user account information and settings -->
 <!--This page was designed with the aid of a Coding2GO YouTube Video: https://www.youtube.com/watch?v=bVl5_UdcAy0&t=222s -->
<html lang="en">
<!--Javascript Function, button that brings user to the home page -->
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="account.js" defer></script>
</head>

<body>
    <button class="home-button none" onclick="goHome()">
      <img src="public/uploads/images/home-button.png" alt="Home Button" class="home-icon">
</button>

    <div class="wrapper">
        <!--Allows user to manage their account information and edit it-->
        <h1>👤 Account Information</h1>

        <p>Username: <span id="username-display"></span></p>
        <p>Email: <span id="email-display"></span></p>

        <div>
            <!--Javascript Function, button that allows user to edit their account information-->
            <button class="account-button" id="editAccountBtn" onclick="editAccount()">Edit Account</button>
<br>
            <div id="editForm">
                <input type="text" id="username_change" placeholder="New Username" >
                <input type="email" id="email_change" placeholder="New Email" >
                <input type="password" id="password_change" placeholder="New Password" >
                <input type="password" id="confirm_password_change" placeholder="Confirm New Password">
                <button id="saveBtn" style="display:none;">Save Changes</button>
            </div>

        </div>
<br><br>
        <div>
            <!--Javascript Function, button that allows user to sign out of their account-->
            <button class="account-button" id="signOutBtn" onclick="signOut()">Sign Out</button>
        </div>
<br>
        <div>
            <!--Javascript Function, button that allows user to delete their account information-->
            <button class="account-button" id="deleteAccountBtn" onclick="deleteAccount()">Delete Account</button>
        </div>
    </div>

    <div class="wrapper">
        <!--Allows user to manage their account settings-->
        <h2>My Settings</h2>
        <div id="settings">
            <p>Notification Preferences: <span id="notification-preferences"></span></p>
            <p>Privacy Settings: <span id="privacy-settings"></span></p>
            <p>Language: <span id="language"></span></p>
            <p>Theme: <span id="theme"></span></p>

            <!--Javascript Function, button that allows user to edit their account settings-->
            <button class="account-button" id="editSettingsBtn" onclick="editSettings()">Edit Settings</button>

            <div id="editSettingsForm">
                <label for="notificationPreferencesInput">Notification Preferences:</label>
                <input type="text" id="notificationPreferencesInput" placeholder="e.g. Email, SMS, Push">

                <label for="privacySettingsInput">Privacy Settings:</label>
                <input type="text" id="privacySettingsInput" placeholder="e.g. Public, Friends Only, Private">

                <label for="languageInput">Language:</label>
                <input type="text" id="languageInput" placeholder="e.g. English, Spanish">

                <label for="themeInput">Theme:</label>
                <input type="text" id="themeInput" placeholder="e.g. Light, Dark">

                <!-- Javascript Function, button that allows user to save their settings -->
                <button class="account-button" id="saveSettingsBtn" onclick="saveSettings()">Save Settings</button>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script type="module" src="script.js"></script>

</body>
</html>
