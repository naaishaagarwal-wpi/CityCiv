<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#000000">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Account</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <!-- Supabase FIRST -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Your JS (must be module if using import supabaseClient) -->
  <script type="module" src="account.js" defer></script>
</head>

<body>

  <!-- Home Button -->
  <button class="home-button none" onclick="goHome()">
    <img src="public/uploads/images/home-button.png" alt="Home" class="home-icon">
  </button>

  <!-- ACCOUNT SECTION -->
  <div class="wrapper">

    <h1>👤 Account Information</h1>

    <p>
      Username:
      <input id="username" type="text" disabled />
    </p>

    <p>
      Full Name:
      <input id="full_name" type="text" disabled />
    </p>

    <button class="account-button" onclick="editAccount()">
      Edit Account
    </button>

    <button class="account-button" id="saveBtn" onclick="save()" style="display:none;">
      Save Changes
    </button>

    <br><br>

    <button class="account-button" onclick="signOut()">
      Sign Out
    </button>

    <button class="account-button" onclick="deleteAccount()">
      Delete Account
    </button>

  </div>

  <!-- SETTINGS SECTION (optional UI only) -->
  <div class="wrapper">

    <h2>My Settings</h2>

    <p>Notification Preferences: <span id="notification-preferences"></span></p>
    <p>Privacy Settings: <span id="privacy-settings"></span></p>
    <p>Language: <span id="language"></span></p>
    <p>Theme: <span id="theme"></span></p>

    <button class="account-button" onclick="editSettings()">
      Edit Settings
    </button>

    <div id="editSettingsForm" style="display:none;">

      <input id="notificationPreferencesInput" placeholder="Notifications (Email, Push...)" />
      <input id="privacySettingsInput" placeholder="Privacy (Public, Private...)" />
      <input id="languageInput" placeholder="Language" />
      <input id="themeInput" placeholder="Theme" />

      <button class="account-button" onclick="saveSettings()">
        Save Settings
      </button>

    </div>

  </div>

</body>
</html>
