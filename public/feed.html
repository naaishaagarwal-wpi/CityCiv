<!DOCTYPE html>
<html>
<head>
  <title>Feed</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class = "feed-body">

  <div class="feed-header">
    <div class="header-actions">
      <button class="button" id="signOutBtn">⬅️ Sign Out</button>
      <button id="openPostBtn" class="button">➕ Create</button>

  <select id="categoryFilter">
    <option value="">All</option>
    <option value="General">General</option>
    <option value="event">Events</option>
    <option value="Announcements">Announcements</option>
  </select>
    </div>
    <button class="home-button none" onclick="goHome()">
      <img src="public/uploads/images/home-button.png" alt="Home Button" class="home-icon">
    </button>
  </div>

  <h1>Welcome&nbsp;<span id="nameDisplay"></span></h1>

  <div id="posts"></div>

  <div id="postModal" class="post1">

    <div class="post2">
      <h3>Create Post</h3>

      <textarea id="modalPostInput" placeholder="Write your post"></textarea>

      <br><br>

      <select id="categoryInput">
        <option value="General">General</option>
        <option value="event">Events</option>
        <option value="Announcements">Announcements</option>
      </select>

      <div id="eventFields" style="display:none;">
        <input type="date" id="eventDate">
        <input type="time" id="eventTime">
        <input type="text" id="eventLocation" placeholder="Location">
      </div>

      <br><br>

      <input type="file" id="imageInput" />

      <br><br>

      <!-- Buttons now have IDs for JS listeners -->
      <button id="submitPostBtn">Post</button>
      <button id="closeModalBtn">Cancel</button>
    </div>

  </div>

  


  <!-- Load Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Load your app logic as a module -->
  <script type="module" src="script.js"></script>

</body>
</html>
