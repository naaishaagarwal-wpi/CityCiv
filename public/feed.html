<!DOCTYPE html>
<html>
<head>
  <title>Feed</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Welcome <span id="nameDisplay"></span></h1>

  <!-- Sign Out Button -->
  <button id="signOutBtn">Sign Out</button>

  <!-- Create Post Modal Trigger -->
  <button id="openPostBtn">➕ Create Post</button>

  <div id="posts"></div>

  <!-- Modal -->
  <div id="postModal"
       style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">

    <div style="background:white; padding:20px; margin:100px auto; width:300px;">
      <h3>Create Post</h3>

      <textarea id="modalPostInput" placeholder="Write your post"></textarea>

      <br><br>

      <select id="categoryInput">
        <option value="General">General</option>
        <option value="Events">Events</option>
        <option value="Announcements">Announcements</option>
      </select>

      <br><br>

      <input type="file" id="imageInput" />

      <br><br>

      <!-- Buttons now have IDs for JS listeners -->
      <button id="submitPostBtn">Post</button>
      <button id="closeModalBtn">Cancel</button>
    </div>

  </div>

  <!-- Home Navigation -->
  <button id="goHomeBtn">Home</button>

  <!-- Load Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Load your app logic as a module -->
  <script type="module" src="script.js"></script>

</body>
</html>
