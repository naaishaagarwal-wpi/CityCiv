<!DOCTYPE html>
<!-- Home page for navigating to different sections of the CityCiv application -->
<html>

<head>
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
</head>

<body class="home-body">

  <h1>Welcome to CityCiv!</h1>

  <div class = "home-buttons">
    <!--Javascript Functions, buttons that bring user to different sections of the app -->
    <button class="bigbutton" onclick="goToFeed()">📢 Dashboard</button>
    <button class="bigbutton" onclick="goToLearn()">📚 Learn</button>
    <button class="bigbutton" onclick="goToMeetings()">🏛️ Town Meetings</button>
    <button class="bigbutton" onclick="goToAccount()">👤 Account</button>
    <button class="bigbutton" id="installBtn">Download App</button>
    <button class="bigbutton" id="signOutBtn">⬅️ Sign Out</button>
  </div>

  <script src="home.js"></script>
  <script type="module" src="feed.js"></script>
</body>

</html>
